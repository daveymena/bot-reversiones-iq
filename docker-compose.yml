version: '3.8'

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot-pro
    restart: unless-stopped
    
    environment:
      # Broker Configuration
      BROKER_NAME: ${BROKER_NAME:-exnova}
      ACCOUNT_TYPE: ${ACCOUNT_TYPE:-PRACTICE}
      EXNOVA_EMAIL: ${EXNOVA_EMAIL}
      EXNOVA_PASSWORD: ${EXNOVA_PASSWORD}
      
      # Trading Parameters
      CAPITAL_PER_TRADE: ${CAPITAL_PER_TRADE:-1}
      MAX_MARTINGALE: ${MAX_MARTINGALE:-0}
      
      # AI/LLM Configuration
      USE_LLM: ${USE_LLM:-True}
      USE_GROQ: ${USE_GROQ:-False}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      
      # Ollama Configuration
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      USE_OLLAMA: ${USE_OLLAMA:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120000}
      
      # System
      HEADLESS_MODE: "True"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    
    volumes:
      # Persistencia de datos
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      
      # Configuración
      - ./.env:/app/.env:ro
    
    # Limites de recursos (opcional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 1G
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('data/bot_running.flag') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

