version: '3.8'

services:
  trading-bot:
    build: .
    container_name: trading-bot-deep-learning
    restart: unless-stopped
    environment:
      - EXNOVA_EMAIL=${EXNOVA_EMAIL}
      - EXNOVA_PASSWORD=${EXNOVA_PASSWORD}
      - BROKER_NAME=exnova
      - ACCOUNT_TYPE=PRACTICE
      - GROQ_API_KEY=${GROQ_API_KEY}
      - USE_LLM=True
      - USE_GROQ=True
      - HEADLESS_MODE=True
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

